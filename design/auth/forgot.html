<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Forgot password · Mereka</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shell/mereka-shell.css">
<style>body{background:#FAFBFC}.auth-card{max-width:420px;margin:120px auto;background:#fff;border:1px solid var(--line);border-radius:16px;padding:40px}</style>
</head>
<body>
<div class="auth-card">
  <a href="login.html" style="font-size:12.5px;color:#64748B;text-decoration:none">← Back to sign in</a>
  <h1 style="font-size:24px;font-weight:800;letter-spacing:-.02em;margin-top:18px">Forgot your password?</h1>
  <p style="font-size:13.5px;color:#64748B;margin-top:6px;margin-bottom:24px">Enter the email you signed up with. We'll send you a reset link.</p>
  <div class="form-row"><label>Email</label><input class="input" type="email" placeholder="you@company.com"/></div>
  <a href="verify.html" class="btn btn-pink" style="width:100%;justify-content:center;padding:11px;border-radius:10px">Send reset link</a>
  <p style="font-size:12.5px;color:#64748B;margin-top:18px;text-align:center">Need help? <a href="#" style="color:#E5397B;font-weight:500">Contact support</a></p>
</div>
</body></html>
