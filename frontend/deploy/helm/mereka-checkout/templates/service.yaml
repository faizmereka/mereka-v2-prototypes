apiVersion: v1
kind: Service
metadata:
  name: mereka-checkout
  labels:
    {{- include "mereka-checkout.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "mereka-checkout.selectorLabels" . | nindent 4 }}
