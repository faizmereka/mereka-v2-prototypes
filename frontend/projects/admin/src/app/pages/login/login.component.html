<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-neutral-100 to-neutral-200 p-4">
  <div class="flex flex-col items-center gap-8 w-full max-w-[420px] animate-fade-in">
    <!-- Logo -->
    <div class="flex items-center gap-3">
      <img src="icons/mereka-logo.svg" alt="Mereka" class="w-12 h-auto" />
      <img src="images/group(1).svg" alt="Admin" class="h-6 w-auto" />
    </div>

    <!-- Login Form -->
    <div class="w-full bg-white border border-neutral-200 rounded-lg p-8 shadow-lg">
      <h1 class="text-2xl font-black mb-2">Sign In</h1>
      <p class="text-neutral-500 mb-6">Welcome back to Mereka Admin</p>

      <form (ngSubmit)="onSubmit()" class="flex flex-col gap-5">
        <div class="flex flex-col gap-2">
          <label for="email" class="font-bold text-sm">Email</label>
          <input
            type="email"
            id="email"
            [(ngModel)]="email"
            name="email"
            class="w-full px-4 py-3 border border-neutral-300 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all"
            placeholder="Enter your email"
            required
          />
        </div>

        <div class="flex flex-col gap-2">
          <label for="password" class="font-bold text-sm">Password</label>
          <input
            type="password"
            id="password"
            [(ngModel)]="password"
            name="password"
            class="w-full px-4 py-3 border border-neutral-300 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all"
            placeholder="Enter your password"
            required
          />
        </div>

        @if (info()) {
          <div class="p-3 bg-info/10 border border-info rounded-md text-info text-sm">
            {{ info() }}
          </div>
        }

        @if (error()) {
          <div class="p-3 bg-error/10 border border-error rounded-md text-error text-sm">
            {{ error() }}
          </div>
        }

        <button
          type="submit"
          class="w-full py-3 px-4 bg-primary text-white font-bold rounded-md hover:bg-primary-dark transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
          [disabled]="isLoading()"
        >
          @if (isLoading()) {
            <span>Signing in...</span>
          } @else {
            <span>Sign In</span>
          }
        </button>
      </form>
    </div>

    <p class="text-neutral-500 text-sm">
      &copy; {{ currentYear }} Mereka. All rights reserved.
    </p>
  </div>
</div>
