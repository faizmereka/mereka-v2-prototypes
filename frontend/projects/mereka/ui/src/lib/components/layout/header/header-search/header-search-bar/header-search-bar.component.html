<div class="search-box">
  <div class="search-box__wrap">
    <svg class="search-box__icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
    </svg>
    <input
      #searchInput
      class="search-box__input"
      placeholder="What are you looking for?"
      [value]="searchService.searchTerm()"
      (input)="updateSearchInput(searchInput.value)"
    />
    @if (searchService.searchTerm()) {
      <button
        type="button"
        ui-button
        class="navbar-search-reset"
        aria-label="Reset search term"
        (click)="resetSearchInput($event); searchInput.value = ''">
        <svg class="search-box__icon" fill="currentColor" viewBox="0 0 24 24">
          <path d="M12 2C6.47 2 2 6.47 2 12s4.47 10 10 10 10-4.47 10-10S17.53 2 12 2zm5 13.59L15.59 17 12 13.41 8.41 17 7 15.59 10.59 12 7 8.41 8.41 7 12 10.59 15.59 7 17 8.41 13.41 12 17 15.59z"/>
        </svg>
      </button>
    }
  </div>
</div>
