<span
  class="inline-flex items-center gap-1 px-3 py-1 rounded-full text-sm font-medium transition-colors"
  [class.bg-primary-100]="variant === 'primary'"
  [class.text-primary-700]="variant === 'primary'"
  [class.bg-gray-100]="variant === 'default'"
  [class.text-gray-700]="variant === 'default'"
  [class.bg-green-100]="variant === 'success'"
  [class.text-green-700]="variant === 'success'"
>
  <ng-content></ng-content>
  @if (removable) {
    <button
      type="button"
      (click)="remove.emit()"
      class="ml-1 rounded-full p-0.5 hover:bg-black/10 transition-colors"
    >
      <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
      </svg>
    </button>
  }
</span>
