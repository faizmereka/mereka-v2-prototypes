<div class="relative">
  <!-- Loading State -->
  @if (isLoading()) {
    <div class="absolute inset-y-0 left-3 flex items-center pointer-events-none">
      <div class="w-4 h-4 border-2 border-neutral-300 border-t-primary rounded-full animate-spin"></div>
    </div>
  }

  <!-- Location Icon -->
  @if (!isLoading()) {
    <div class="absolute inset-y-0 left-3 flex items-center pointer-events-none">
      <svg
        class="w-5 h-5"
        [class.text-primary]="isFocused() || inputValue()"
        [class.text-neutral-400]="!isFocused() && !inputValue()"
        fill="none"
        stroke="currentColor"
        viewBox="0 0 24 24"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"
        />
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"
        />
      </svg>
    </div>
  }

  <!-- Input Field -->
  <input
    #searchInput
    type="text"
    [placeholder]="placeholder()"
    [disabled]="disabled() || isLoading()"
    (focus)="onFocus()"
    (blur)="onBlur()"
    class="w-full pl-10 pr-10 py-2.5 border rounded-lg outline-none transition-colors bg-white"
    [class.border-neutral-300]="!isFocused()"
    [class.border-primary]="isFocused()"
    [class.focus:ring-2]="true"
    [class.focus:ring-primary/20]="true"
    [class.opacity-50]="disabled()"
    [class.cursor-not-allowed]="disabled()"
  />

  <!-- Clear Button -->
  @if (showClearButton() && inputValue() && !disabled()) {
    <button
      type="button"
      (click)="clearInput()"
      class="absolute inset-y-0 right-3 flex items-center text-neutral-400 hover:text-neutral-600 transition-colors"
    >
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
      </svg>
    </button>
  }
</div>
