<span
  class="ui-tooltip-toggle"
  (mouseover)="toggleTooltip()"
  (mouseout)="toggleTooltip()"
  (blur)="toggleTooltip()"
  (focus)="toggleTooltip()"
>
  <ng-content></ng-content>
</span>
<div
  class="ui-tooltip-dialog"
  [@showHide]="_getVisibilityState()"
  (@showHide.start)="animationStart($event)"
  (@showHide.done)="animationEnd($event)"
>
  <div
    class="ui-tooltip-inner-wrap"
    [style]="customStyle"
    [innerHTML]="tooltipText"
  ></div>
  <div class="ui-tooltip-pointer">
    <svg width="14" height="9" viewBox="0 0 14 9" fill="currentColor">
      <path d="M7 9L1.28936e-06 -1.34313e-06L14 -1.19209e-07L7 9Z" />
    </svg>
  </div>
</div>
