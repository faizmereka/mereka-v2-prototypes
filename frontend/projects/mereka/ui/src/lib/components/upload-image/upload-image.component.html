<div
  class="relative transition-colors overflow-hidden cursor-pointer"
  [class.rounded-xl]="displayType() !== 'avatar'"
  [class.rounded-full]="displayType() === 'avatar'"
  [class.border-2]="displayType() !== 'avatar'"
  [class.border-dashed]="displayType() !== 'avatar' && !src()"
  [class.border-gray-300]="!isDragging && !src() && displayType() !== 'avatar'"
  [class.border-primary-400]="isDragging"
  [class.bg-primary-50]="isDragging"
  [class.border-transparent]="src() && displayType() !== 'avatar'"
  [class.aspect-video]="displayType() === 'cover'"
  [class.aspect-square]="displayType() === 'thumbnail' || displayType() === 'avatar'"
  [class.w-24]="displayType() === 'thumbnail'"
  [class.h-24]="displayType() === 'thumbnail'"
  [class.w-20]="displayType() === 'avatar'"
  [class.h-20]="displayType() === 'avatar'"
  [class.bg-neutral-200]="displayType() === 'avatar' && !src()"
  (dragover)="onDragOver($event)"
  (dragleave)="onDragLeave($event)"
  (drop)="onDrop($event)"
  (click)="upload()"
>
  @if (src()) {
    <div class="relative w-full h-full group">
      <img [src]="src()" alt="Uploaded image" class="w-full h-full object-cover" />
      <div class="absolute inset-0 bg-black/50 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center gap-2">
        <button
          type="button"
          (click)="upload(); $event.stopPropagation()"
          class="p-2 bg-white rounded-full hover:bg-gray-100 transition-colors"
        >
          <svg class="w-5 h-5 text-gray-700" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" />
          </svg>
        </button>
        @if (displayType() !== 'avatar') {
          <button
            type="button"
            (click)="removeImage(); $event.stopPropagation()"
            class="p-2 bg-white rounded-full hover:bg-gray-100 transition-colors"
          >
            <svg class="w-5 h-5 text-red-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
            </svg>
          </button>
        }
      </div>
    </div>
  } @else {
    @if (displayType() === 'avatar') {
      <!-- Avatar empty state - camera icon -->
      <div class="flex items-center justify-center w-full h-full">
        <svg class="w-8 h-8 text-neutral-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" />
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z" />
        </svg>
      </div>
    } @else {
      <!-- Cover/Thumbnail empty state -->
      <div class="flex flex-col items-center justify-center p-8 text-center h-full">
        <svg class="w-12 h-12 text-gray-400 mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
        </svg>
        <ng-content></ng-content>
        @if (showDragHint()) {
          <p class="text-sm text-gray-400 mt-2">or drag them in</p>
        }
      </div>
    }
  }

  <input
    #fileInput
    type="file"
    [accept]="accept()"
    [multiple]="multiple()"
    (change)="onFileSelected($event)"
    class="hidden"
  />
</div>
