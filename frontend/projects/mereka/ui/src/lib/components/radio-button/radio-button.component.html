<label
  class="flex items-center gap-3 p-3 rounded-lg border cursor-pointer transition-all"
  [class.border-primary-500]="checked"
  [class.bg-primary-50]="checked"
  [class.border-gray-200]="!checked"
  [class.hover:border-gray-300]="!checked && !disabled"
  [class.hover:bg-gray-50]="!checked && !disabled"
  [class.opacity-50]="disabled"
  [class.cursor-not-allowed]="disabled"
>
  <div
    class="w-5 h-5 rounded-full border-2 flex items-center justify-center shrink-0 transition-colors"
    [class.border-primary-500]="checked"
    [class.border-gray-300]="!checked"
  >
    @if (checked) {
      <div class="w-2.5 h-2.5 rounded-full bg-primary-500"></div>
    }
  </div>
  <span class="text-sm font-medium" [class.text-primary-700]="checked" [class.text-gray-700]="!checked">
    <ng-content></ng-content>
  </span>
</label>
