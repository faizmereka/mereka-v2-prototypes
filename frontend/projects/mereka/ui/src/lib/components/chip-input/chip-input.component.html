<div class="space-y-2">
  <div class="flex flex-wrap gap-2">
    @for (chip of chips; track chip) {
      <ui-chip [removable]="true" (remove)="removeChip(chip)" [variant]="chipVariant">
        {{ chip }}
      </ui-chip>
    }
  </div>
  <div class="relative">
    <input
      type="text"
      [(ngModel)]="inputValue"
      (keydown.enter)="addChip($event)"
      (keydown.comma)="addChip($event)"
      [placeholder]="placeholder"
      [maxlength]="maxChipLength"
      [disabled]="disabled || (maxChips > 0 && chips.length >= maxChips)"
      class="w-full px-4 py-2.5 rounded-lg border border-gray-300 focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none transition-colors disabled:bg-gray-100 disabled:cursor-not-allowed"
    />
    @if (inputValue) {
      <button
        type="button"
        (click)="addChipFromButton()"
        class="absolute right-2 top-1/2 -translate-y-1/2 px-3 py-1 bg-primary-500 text-white text-sm rounded-md hover:bg-primary-600 transition-colors"
      >
        Add
      </button>
    }
  </div>
  @if (maxChips > 0) {
    <p class="text-xs text-gray-400">{{ chips.length }} / {{ maxChips }} tags</p>
  }
</div>
