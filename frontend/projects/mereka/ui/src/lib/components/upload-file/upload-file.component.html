<div
  class="relative rounded-xl border-2 border-dashed p-6 transition-colors text-center"
  [class.border-gray-300]="!isDragging"
  [class.border-primary-400]="isDragging"
  [class.bg-primary-50]="isDragging"
  (dragover)="onDragOver($event)"
  (dragleave)="onDragLeave($event)"
  (drop)="onDrop($event)"
>
  <svg class="w-10 h-10 text-gray-400 mx-auto mb-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />
  </svg>
  <ng-content></ng-content>
  <p class="text-sm text-gray-400 mt-2">or drag and drop</p>
  <p class="text-xs text-gray-400 mt-1">{{ acceptLabel() }}</p>

  <input
    #fileInput
    type="file"
    [accept]="accept()"
    [multiple]="multiple()"
    (change)="onFileSelected($event)"
    class="hidden"
  />
</div>
