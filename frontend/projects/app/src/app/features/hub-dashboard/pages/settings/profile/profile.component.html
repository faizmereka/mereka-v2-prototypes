<div class="hub-settings-profile p-4 lg:p-8">
  <div class="max-w-3xl">
    <!-- Page Header -->
    <div class="page-header mb-8">
      <h1 class="text-2xl font-bold text-neutral-900">Business Profile</h1>
      <p class="text-neutral-500 mt-1">Manage your business information</p>
    </div>

    <!-- Profile Form -->
    <div class="space-y-8">
      <!-- Logo & Cover -->
      <div class="bg-white rounded-xl border border-neutral-200 p-6">
        <h2 class="text-lg font-semibold text-neutral-900 mb-6">Logo & Cover Image</h2>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <!-- Logo -->
          <div>
            <label class="block text-sm font-medium text-neutral-700 mb-2">Logo</label>
            <div class="w-32 h-32 rounded-xl border-2 border-dashed border-neutral-300 flex items-center justify-center bg-neutral-50 hover:bg-neutral-100 cursor-pointer transition-colors">
              @if (hubLogo()) {
                <img [src]="hubLogo()" alt="Logo" class="w-full h-full object-cover rounded-xl" />
              } @else {
                <div class="text-center">
                  <ui-icon name="image" size="lg" class="text-neutral-400 mb-2" />
                  <p class="text-xs text-neutral-500">Upload Logo</p>
                </div>
              }
            </div>
          </div>

          <!-- Cover -->
          <div>
            <label class="block text-sm font-medium text-neutral-700 mb-2">Cover Image</label>
            <div class="w-full h-32 rounded-xl border-2 border-dashed border-neutral-300 flex items-center justify-center bg-neutral-50 hover:bg-neutral-100 cursor-pointer transition-colors">
              @if (hubCover()) {
                <img [src]="hubCover()" alt="Cover" class="w-full h-full object-cover rounded-xl" />
              } @else {
                <div class="text-center">
                  <ui-icon name="image" size="lg" class="text-neutral-400 mb-2" />
                  <p class="text-xs text-neutral-500">Upload Cover Image</p>
                </div>
              }
            </div>
          </div>
        </div>
      </div>

      <!-- Basic Info -->
      <div class="bg-white rounded-xl border border-neutral-200 p-6">
        <h2 class="text-lg font-semibold text-neutral-900 mb-6">Basic Information</h2>

        <div class="space-y-6">
          <div>
            <label class="block text-sm font-medium text-neutral-700 mb-2">Business Name</label>
            <input
              type="text"
              [value]="hubName()"
              class="w-full px-4 py-2 border border-neutral-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent"
            />
          </div>

          <div>
            <label class="block text-sm font-medium text-neutral-700 mb-2">Description</label>
            <textarea
              rows="4"
              [value]="hubDescription()"
              class="w-full px-4 py-2 border border-neutral-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent resize-none"
            ></textarea>
          </div>
        </div>
      </div>

      <!-- Contact Info -->
      <div class="bg-white rounded-xl border border-neutral-200 p-6">
        <h2 class="text-lg font-semibold text-neutral-900 mb-6">Contact Information</h2>

        <div class="space-y-6">
          <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div>
              <label class="block text-sm font-medium text-neutral-700 mb-2">Email</label>
              <input
                type="email"
                [value]="hubEmail()"
                class="w-full px-4 py-2 border border-neutral-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent"
              />
            </div>
            <div>
              <label class="block text-sm font-medium text-neutral-700 mb-2">Phone</label>
              <input
                type="tel"
                [value]="hubPhone()"
                class="w-full px-4 py-2 border border-neutral-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent"
              />
            </div>
          </div>

          <div>
            <label class="block text-sm font-medium text-neutral-700 mb-2">Website</label>
            <input
              type="url"
              [value]="hubWebsite()"
              class="w-full px-4 py-2 border border-neutral-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent"
            />
          </div>

          <div>
            <label class="block text-sm font-medium text-neutral-700 mb-2">Address</label>
            <textarea
              rows="2"
              [value]="hubAddress()"
              class="w-full px-4 py-2 border border-neutral-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent resize-none"
            ></textarea>
          </div>
        </div>
      </div>

      <!-- Save Button -->
      <div class="flex justify-end">
        <button
          type="button"
          (click)="saveProfile()"
          [disabled]="saving()"
          class="px-8 py-3 bg-primary text-white rounded-full font-semibold hover:bg-primary-dark transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
        >
          @if (saving()) {
            <span>Saving...</span>
          } @else {
            <span>Save Changes</span>
          }
        </button>
      </div>
    </div>
  </div>
</div>
