<!-- Assign Member Modal - @covers AC-FEH-040 through AC-FEH-044 -->
<div
  class="fixed inset-0 z-50 flex items-center justify-center bg-black/50"
  (click)="onBackdropClick($event)"
>
  <div class="bg-white rounded-lg shadow-xl w-full max-w-md mx-4 overflow-hidden">
    <!-- Header -->
    <div class="flex items-center justify-between p-4 border-b border-neutral-200">
      <h3 class="text-lg font-semibold text-neutral-900">Assign Conversation</h3>
      <button
        type="button"
        (click)="close.emit()"
        class="p-1 rounded-lg hover:bg-neutral-100 text-neutral-500"
      >
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>
    </div>

    <!-- Content -->
    <div class="p-4 max-h-96 overflow-y-auto">
      <!-- @covers AC-FEH-043 - Unassign option -->
      @if (currentAssigneeId()) {
        <button
          type="button"
          (click)="unassignCurrent()"
          [disabled]="assigning() !== null"
          class="w-full flex items-center gap-3 p-3 mb-2 rounded-lg border border-neutral-200 hover:bg-neutral-50 transition-colors disabled:opacity-50"
        >
          <div class="w-10 h-10 rounded-full bg-neutral-200 flex items-center justify-center">
            <svg class="w-5 h-5 text-neutral-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
            </svg>
          </div>
          <div class="flex-1 text-left">
            <p class="font-medium text-neutral-900">Unassign</p>
            <p class="text-sm text-neutral-500">Remove current assignment</p>
          </div>
          @if (assigning() === 'unassign') {
            <svg class="animate-spin h-5 w-5 text-neutral-500" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
          }
        </button>

        <div class="border-t border-neutral-200 my-3"></div>
      }

      <!-- Loading state -->
      @if (loading()) {
        <div class="space-y-3">
          @for (i of [1, 2, 3]; track i) {
            <div class="flex items-center gap-3 p-3 animate-pulse">
              <div class="w-10 h-10 rounded-full bg-neutral-200"></div>
              <div class="flex-1 space-y-2">
                <div class="h-4 bg-neutral-200 rounded w-3/4"></div>
                <div class="h-3 bg-neutral-200 rounded w-1/2"></div>
              </div>
            </div>
          }
        </div>
      } @else if (members().length === 0) {
        <div class="text-center py-8 text-neutral-500">
          <p>No team members found</p>
        </div>
      } @else {
        <!-- @covers AC-FEH-040, AC-FEH-041, AC-FEH-042 - Member list -->
        <div class="space-y-1">
          @for (member of members(); track member.userId) {
            <button
              type="button"
              (click)="assignMember(member)"
              [disabled]="assigning() !== null"
              class="w-full flex items-center gap-3 p-3 rounded-lg hover:bg-neutral-50 transition-colors disabled:opacity-50"
              [class.bg-primary-50]="currentAssigneeId() === member.userId"
              [class.border]="currentAssigneeId() === member.userId"
              [class.border-primary]="currentAssigneeId() === member.userId"
            >
              <!-- Avatar -->
              @if (member.avatar) {
                <img
                  [src]="member.avatar"
                  [alt]="member.name"
                  class="w-10 h-10 rounded-full object-cover"
                />
              } @else {
                <div class="w-10 h-10 rounded-full bg-primary text-white flex items-center justify-center font-medium text-sm">
                  {{ getInitials(member.name) }}
                </div>
              }

              <!-- Info -->
              <div class="flex-1 text-left min-w-0">
                <p class="font-medium text-neutral-900 truncate">{{ member.name }}</p>
                <p class="text-sm text-neutral-500 truncate">{{ member.email }}</p>
              </div>

              <!-- @covers AC-FEH-041 - Current assignee indicator -->
              @if (currentAssigneeId() === member.userId) {
                <span class="px-2 py-1 text-xs font-medium bg-primary text-white rounded-full">
                  Assigned
                </span>
              }

              <!-- Loading spinner for this member -->
              @if (assigning() === member.userId) {
                <svg class="animate-spin h-5 w-5 text-primary" fill="none" viewBox="0 0 24 24">
                  <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                  <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
              }
            </button>
          }
        </div>
      }
    </div>

    <!-- Footer -->
    <div class="flex justify-end gap-2 p-4 border-t border-neutral-200 bg-neutral-50">
      <button
        type="button"
        (click)="close.emit()"
        class="px-4 py-2 text-sm font-medium text-neutral-700 bg-white border border-neutral-300 rounded-lg hover:bg-neutral-50"
      >
        Cancel
      </button>
    </div>
  </div>
</div>
