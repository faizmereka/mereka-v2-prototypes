<div class="min-h-screen bg-white relative overflow-hidden">
  <!-- Background Gradient Blobs -->
  <div class="absolute top-0 right-0 w-96 h-96 bg-gradient-to-bl from-yellow-200/40 via-orange-100/30 to-transparent rounded-full blur-3xl"></div>
  <div class="absolute bottom-0 right-0 w-[600px] h-[600px] bg-gradient-to-tl from-pink-300/50 via-fuchsia-200/40 to-transparent rounded-full blur-3xl"></div>

  <!-- Content -->
  <div class="relative z-10 flex flex-col items-center justify-center min-h-screen px-4 py-12">
    <div class="w-full max-w-3xl">
      <!-- Success Message -->
      <div class="text-center mb-8">
        <h1 class="text-2xl lg:text-3xl font-bold text-neutral-900 mb-2">
          You have successfully signed up on Mereka!
        </h1>
        <p class="text-base text-neutral-500">
          Complete your profile to start growing your services.
        </p>
      </div>

      <!-- Share URL -->
      <div class="flex justify-center mb-6">
        @if (isLoading()) {
          <div class="inline-flex items-center gap-2 bg-white border border-neutral-200 rounded-full px-4 py-2">
            <div class="animate-spin rounded-full h-4 w-4 border-b-2 border-primary"></div>
            <span class="text-sm text-neutral-400">Loading your profile URL...</span>
          </div>
        } @else if (shareUrl()) {
          <div class="inline-flex items-center gap-2 bg-white border border-neutral-200 rounded-full px-4 py-2">
            <ui-icon name="info" class="w-4 h-4 text-neutral-400"></ui-icon>
            <span class="text-sm text-neutral-600">{{ shareUrl() }}</span>
            <button
              type="button"
              (click)="copyUrl()"
              class="p-1 text-neutral-400 hover:text-neutral-600 transition-colors"
            >
              <ui-icon [name]="copied() ? 'check' : 'copy'" class="w-4 h-4"></ui-icon>
            </button>
          </div>
        }
      </div>

      <!-- Choose Path Text -->
      <p class="text-center text-neutral-600 mb-6">Choose your next path:</p>

      <!-- Path Selection Cards -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-10 max-w-2xl mx-auto">
        <!-- Complete Profile Card -->
        <button
          type="button"
          (click)="selectOption('profile')"
          class="relative bg-white rounded-2xl border p-6 text-center transition-all hover:shadow-lg"
          [class.border-neutral-200]="selection() !== 'profile'"
          [class.border-primary]="selection() === 'profile'"
          [class.shadow-lg]="selection() === 'profile'"
        >
          <!-- Recommended Badge -->
          <div class="absolute top-4 left-4">
            <span class="px-3 py-1 bg-primary text-white text-xs font-semibold rounded-md uppercase">
              Recommended
            </span>
          </div>

          <!-- Selection Indicator -->
          <div class="absolute top-4 right-4">
            <div
              class="w-5 h-5 rounded-full border-2 flex items-center justify-center transition-colors"
              [class.border-neutral-300]="selection() !== 'profile'"
              [class.border-primary]="selection() === 'profile'"
              [class.bg-primary]="selection() === 'profile'"
            >
              @if (selection() === 'profile') {
                <ui-icon name="check" class="w-3 h-3 text-white"></ui-icon>
              }
            </div>
          </div>

          <!-- Lottie Animation -->
          <div class="w-40 h-32 mx-auto mt-4 mb-4">
            <ng-lottie [options]="completeProfileOptions"></ng-lottie>
          </div>

          <h3 class="text-lg font-bold text-neutral-900 mb-2">Complete Profile</h3>
          <p class="text-sm text-neutral-500 leading-relaxed">
            Fortify your profile<br />so that you can start<br />publishing services!
          </p>
        </button>

        <!-- View Dashboard Card -->
        <button
          type="button"
          (click)="selectOption('dashboard')"
          class="relative bg-white rounded-2xl border p-6 text-center transition-all hover:shadow-lg"
          [class.border-neutral-200]="selection() !== 'dashboard'"
          [class.border-primary]="selection() === 'dashboard'"
          [class.shadow-lg]="selection() === 'dashboard'"
        >
          <!-- Selection Indicator -->
          <div class="absolute top-4 right-4">
            <div
              class="w-5 h-5 rounded-full border-2 flex items-center justify-center transition-colors"
              [class.border-neutral-300]="selection() !== 'dashboard'"
              [class.border-primary]="selection() === 'dashboard'"
              [class.bg-primary]="selection() === 'dashboard'"
            >
              @if (selection() === 'dashboard') {
                <ui-icon name="check" class="w-3 h-3 text-white"></ui-icon>
              }
            </div>
          </div>

          <!-- Lottie Animation -->
          <div class="w-40 h-32 mx-auto mt-8 mb-4">
            <ng-lottie [options]="dashboardOptions"></ng-lottie>
          </div>

          <h3 class="text-lg font-bold text-neutral-900 mb-2">View Dashboard</h3>
          <p class="text-sm text-neutral-500 leading-relaxed">
            Explore your dashboard<br />to get acquainted with<br />its features.
          </p>
        </button>
      </div>

      <!-- Action Button -->
      <div class="flex justify-center">
        <button
          type="button"
          (click)="navigateToPage()"
          [disabled]="!selection()"
          class="px-12 py-3 bg-neutral-300 text-white font-semibold rounded-full transition-colors disabled:opacity-70 disabled:cursor-not-allowed"
          [class.bg-primary]="selection()"
          [class.hover:bg-primary/90]="selection()"
        >
          Let's go!
        </button>
      </div>
    </div>
  </div>
</div>
