@for (banner of banners(); track banner.id) {
  <div [class]="getSeverityClasses(banner)">
    <!-- Icon -->
    <div class="flex-shrink-0 mt-0.5">
      @switch (banner.severity) {
        @case ('warning') {
          <svg [class]="'w-5 h-5 ' + getIconClasses(banner)" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
          </svg>
        }
        @case ('error') {
          <svg [class]="'w-5 h-5 ' + getIconClasses(banner)" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
          </svg>
        }
        @case ('success') {
          <svg [class]="'w-5 h-5 ' + getIconClasses(banner)" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
          </svg>
        }
        @default {
          <svg [class]="'w-5 h-5 ' + getIconClasses(banner)" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
          </svg>
        }
      }
    </div>

    <!-- Content -->
    <div class="flex-1 min-w-0">
      <h3 [class]="'text-sm font-semibold ' + getTitleClasses(banner)">
        {{ banner.title }}
      </h3>
      <p [class]="'text-sm mt-1 ' + getMessageClasses(banner)">
        {{ banner.message }}
      </p>

      <!-- Action Button -->
      @if (banner.actionLabel && banner.actionFn) {
        <button
          type="button"
          [class]="'mt-3 ' + getButtonClasses(banner)"
          [disabled]="banner.loading"
          (click)="onAction(banner)"
        >
          @if (banner.loading) {
            <span class="inline-flex items-center gap-2">
              <svg class="animate-spin h-4 w-4" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
              </svg>
              Sending...
            </span>
          } @else {
            {{ banner.actionLabel }}
          }
        </button>
      }
    </div>

    <!-- Dismiss Button -->
    @if (banner.dismissible) {
      <button
        type="button"
        class="flex-shrink-0 p-1 rounded hover:bg-black/5 transition-colors"
        (click)="onDismiss(banner)"
      >
        <svg class="w-4 h-4 text-neutral-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
        </svg>
      </button>
    }
  </div>
}
