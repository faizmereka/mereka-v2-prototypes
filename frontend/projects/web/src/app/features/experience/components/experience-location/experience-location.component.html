@if (hasLocation()) {
  <section class="py-12">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <h2 class="text-xl font-semibold text-neutral-900 mb-4">Location</h2>

      <div class="mb-4">
        @if (location().streetAddress) {
          <p class="text-neutral-600">{{ location().streetAddress }}</p>
        }
        <p class="text-neutral-600">{{ addressLine() }}</p>
      </div>

      @if (hasCoordinates()) {
        <ui-map-display
          [lat]="location().lat!"
          [lng]="location().lng!"
          [apiKey]="mapsApiKey"
          height="350px"
          [zoom]="15"
          [useEmbed]="true"
          [interactive]="false" />

        <!-- Get Directions Link -->
        <div class="flex justify-end mt-3">
          <button
            (click)="openGoogleMaps()"
            class="flex items-center gap-2 text-sm text-primary hover:text-primary/80 transition-colors">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" />
            </svg>
            <span>Get Directions</span>
          </button>
        </div>
      }
    </div>
  </section>
}
