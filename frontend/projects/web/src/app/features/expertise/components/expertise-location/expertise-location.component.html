@if (hasPhysical() && hasLocation()) {
  <section class="py-8 border-t border-neutral-200">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <!-- Hybrid Notice -->
      @if (isHybrid()) {
        <div class="bg-blue-50 border border-blue-200 rounded-lg p-4 mb-6">
          <div class="flex items-start gap-3">
            <svg class="w-6 h-6 text-blue-500 flex-shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3.055 11H5a2 2 0 012 2v1a2 2 0 002 2 2 2 0 012 2v2.945M8 3.935V5.5A2.5 2.5 0 0010.5 8h.5a2 2 0 012 2 2 2 0 104 0 2 2 0 012-2h1.064M15 20.488V18a2 2 0 012-2h3.064M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
            <div>
              <h3 class="text-lg font-semibold text-blue-800">This is a Hybrid listing</h3>
              <p class="text-sm text-blue-700 mt-1">
                The address listed below only applies to physical packages.
                Some packages for this Expertise are conducted online.
              </p>
            </div>
          </div>
        </div>
      }

      <!-- Location Header -->
      <h2 class="text-lg font-semibold text-neutral-900 mb-4">Location</h2>

      <!-- Address -->
      <p class="text-neutral-600 mb-4">{{ fullAddress() }}</p>

      <!-- Map -->
      @if (hasMap()) {
        <div class="aspect-video rounded-xl overflow-hidden bg-neutral-100">
          <iframe
            [src]="mapUrl()"
            class="w-full h-full border-0"
            loading="lazy"
            referrerpolicy="no-referrer-when-downgrade"
            allowfullscreen>
          </iframe>
        </div>
      }
    </div>
  </section>
}
