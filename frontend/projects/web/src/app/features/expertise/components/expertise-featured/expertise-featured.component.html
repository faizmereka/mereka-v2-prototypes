@if (hasFeatured()) {
  <section class="py-8 bg-neutral-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <!-- Section Header -->
      <div class="flex items-center justify-between mb-6">
        <h2 class="text-xl font-semibold text-neutral-900">Featured Expertise</h2>
        <button
          (click)="onViewAll()"
          class="text-sm font-medium text-primary hover:underline">
          View All
        </button>
      </div>

      <!-- Cards Grid -->
      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
        @for (card of featuredList(); track card.id) {
          <a
            [routerLink]="['/expertise', card.slug || card.id]"
            class="group bg-white rounded-xl overflow-hidden shadow-sm hover:shadow-md transition-shadow">
            <!-- Image -->
            <div class="aspect-[4/3] relative overflow-hidden">
              @if (card.coverPhoto) {
                <img
                  [src]="card.coverPhoto"
                  [alt]="card.title"
                  class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300" />
              } @else {
                <div class="w-full h-full bg-neutral-200 flex items-center justify-center">
                  <svg class="w-12 h-12 text-neutral-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                  </svg>
                </div>
              }
            </div>

            <!-- Content -->
            <div class="p-4">
              <h3 class="font-medium text-neutral-900 line-clamp-2 mb-1">
                {{ card.title }}
              </h3>
              @if (card.hostName) {
                <p class="text-sm text-neutral-500 mb-2">with {{ card.hostName }}</p>
              }

              <div class="flex items-center justify-between">
                <!-- Rating -->
                @if (card.rating) {
                  <div class="flex items-center gap-1 text-sm text-neutral-600">
                    <svg class="w-4 h-4 text-yellow-400" fill="currentColor" viewBox="0 0 24 24">
                      <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z" />
                    </svg>
                    <span>{{ card.rating.toFixed(1) }}</span>
                  </div>
                }

                <!-- Price -->
                <p class="text-sm font-medium text-neutral-900">
                  From RM{{ card.price }}
                </p>
              </div>
            </div>
          </a>
        }
      </div>
    </div>
  </section>
}
