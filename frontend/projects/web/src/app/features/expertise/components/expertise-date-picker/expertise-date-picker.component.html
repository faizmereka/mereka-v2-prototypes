<div class="bg-white rounded-lg">
  <!-- Month Navigation -->
  <div class="flex items-center justify-between mb-4">
    <button
      type="button"
      [disabled]="!canGoBack()"
      (click)="previousMonth()"
      class="p-2 hover:bg-neutral-100 rounded-lg disabled:opacity-30 disabled:cursor-not-allowed">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
      </svg>
    </button>
    <span class="font-medium text-neutral-900">{{ monthLabel() }}</span>
    <button
      type="button"
      (click)="nextMonth()"
      class="p-2 hover:bg-neutral-100 rounded-lg">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
      </svg>
    </button>
  </div>

  <!-- Weekday Headers -->
  <div class="grid grid-cols-7 gap-1 mb-2">
    @for (day of weekDays; track day) {
      <div class="text-center text-xs font-medium text-neutral-500 py-1">
        {{ day }}
      </div>
    }
  </div>

  <!-- Calendar Days -->
  <div class="grid grid-cols-7 gap-1">
    @for (day of calendarDays(); track $index) {
      @if (day.dayNum) {
        <button
          type="button"
          [disabled]="day.isPast || !day.isAvailable"
          (click)="selectDate(day)"
          [class]="[
            'aspect-square flex items-center justify-center text-sm rounded-lg transition-colors',
            isSelected(day.date)
              ? 'bg-primary text-white'
              : day.isToday
                ? 'bg-primary/10 text-primary font-medium'
                : day.isPast || !day.isAvailable
                  ? 'text-neutral-300 cursor-not-allowed'
                  : 'text-neutral-700 hover:bg-neutral-100'
          ].join(' ')">
          {{ day.dayNum }}
        </button>
      } @else {
        <div class="aspect-square"></div>
      }
    }
  </div>

  <!-- Legend -->
  <div class="mt-4 pt-4 border-t border-neutral-100 flex items-center justify-center gap-4 text-xs text-neutral-500">
    <div class="flex items-center gap-1">
      <div class="w-3 h-3 rounded-full bg-primary/10"></div>
      <span>Today</span>
    </div>
    <div class="flex items-center gap-1">
      <div class="w-3 h-3 rounded-full bg-primary"></div>
      <span>Selected</span>
    </div>
    <div class="flex items-center gap-1">
      <div class="w-3 h-3 rounded-full bg-neutral-200"></div>
      <span>Unavailable</span>
    </div>
  </div>
</div>
