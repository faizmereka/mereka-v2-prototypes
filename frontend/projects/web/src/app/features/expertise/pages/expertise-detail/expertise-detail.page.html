<!-- Navigation Header -->
<web-header />

@if (showSkeleton()) {
  <!-- Loading Skeleton -->
  <main class="min-h-screen bg-white">
    <div class="relative">
      <!-- Dark Background -->
      <div class="absolute top-0 left-0 right-0 bg-primary h-[700px] sm:h-[650px] lg:h-[600px] z-0"></div>

      <!-- Skeleton Content -->
      <div class="relative z-10 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="lg:grid lg:gap-8" style="grid-template-columns: 1fr 330px;">
          <!-- Left Column Skeleton -->
          <div class="animate-pulse">
            <div class="pt-6 pb-8 lg:pt-8 lg:pb-10">
              <div class="h-10 bg-white/20 rounded w-3/4 mb-4"></div>
              <div class="h-5 bg-white/20 rounded w-1/2 mb-6"></div>
              <div class="flex gap-4 mb-6">
                <div class="h-6 bg-white/20 rounded w-24"></div>
                <div class="h-6 bg-white/20 rounded w-32"></div>
              </div>
              <div class="aspect-video bg-white/10 rounded-xl"></div>
            </div>

            <div class="bg-white rounded-t-2xl lg:rounded-none py-8">
              <div class="pb-8">
                <div class="h-6 bg-neutral-200 rounded w-40 mb-4"></div>
                <div class="space-y-3">
                  <div class="h-4 bg-neutral-100 rounded w-full"></div>
                  <div class="h-4 bg-neutral-100 rounded w-3/4"></div>
                </div>
              </div>
            </div>
          </div>

          <!-- Right Column Skeleton -->
          <div class="hidden lg:block">
            <div class="sticky top-24 pt-8 animate-pulse">
              <div class="bg-white rounded-2xl shadow-lg p-6 border border-neutral-200">
                <div class="h-8 bg-neutral-200 rounded w-32 mb-4"></div>
                <div class="h-12 bg-neutral-100 rounded-lg mb-4"></div>
                <div class="h-12 bg-primary/20 rounded-full"></div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <ui-footer />
  </main>
} @else if (slug(); as currentSlug) {
  <main class="min-h-screen bg-white">
    <!-- Layout with Sticky Booking Widget -->
    <div class="relative">
      <!-- Full Width Dark Background -->
      <div class="absolute top-0 left-0 right-0 bg-primary h-[700px] sm:h-[650px] lg:h-[600px] z-0"></div>

      <!-- Content Container -->
      <div class="relative z-10 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="lg:grid lg:gap-8" style="grid-template-columns: 1fr 330px;">

          <!-- Left Column: Header + Content -->
          <div>
            <!-- Header Section -->
            <div class="text-white pt-6 pb-8 lg:pt-8 lg:pb-10">
              <app-expertise-header
                [slug]="currentSlug"
                [isFavorited]="isFavorited()"
                (shareClicked)="onShare()"
                (saveClicked)="onSave()" />
            </div>

            <!-- Content Sections (White Background) -->
            <div class="bg-white rounded-t-2xl lg:rounded-none py-8">
              <!-- About Expert -->
              <div class="pb-8">
                <app-expertise-about-expert [slug]="currentSlug" />
              </div>

              <!-- About the Expertise -->
              <div class="border-t border-neutral-200 py-8">
                <app-expertise-about [slug]="currentSlug" />
              </div>

              <!-- Instructions & FAQ -->
              <div class="border-t border-neutral-200 py-8">
                <app-expertise-instructions [slug]="currentSlug" />
              </div>
            </div>
          </div>

          <!-- Right Column: Booking Widget (Sticky) -->
          <div class="hidden lg:block">
            <div class="sticky top-24 pt-8">
              <app-expertise-booking-widget [slug]="currentSlug" />
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Full Width Sections -->
    <app-expertise-location [slug]="currentSlug" />
    <app-expertise-reviews [slug]="currentSlug" />
    <app-expertise-featured [slug]="currentSlug" />

    <!-- Footer -->
    <ui-footer />
  </main>

  <!-- Mobile Booking Bar -->
  <div class="lg:hidden fixed bottom-0 left-0 right-0 z-50 safe-area-bottom">
    <app-expertise-booking-widget [slug]="currentSlug" [isMobile]="true" />
  </div>
}
