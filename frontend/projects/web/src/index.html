<html lang="en">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Primary Meta Tags -->

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Mereka - Stand on the shoulders of giants" />
  <meta property="og:description" content="Discover experiences, connect with experts, and unlock your potential." />
  <meta property="og:image" content="https://firebasestorage.googleapis.com/v0/b/mereka-a4ae2.appspot.com/o/mereka-io-logo.png?alt=media&token=8fd42366-f5cf-4299-ad19-3ae40f47c7af" />

  <!-- Lato Font -->

  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700;900&display=swap" rel="stylesheet">

  <!-- Preload fonts to prevent FOUT (Flash of Unstyled Text) -->
  <link rel="preload" href="/assets/fonts/InterVariable.woff2" as="font" type="font/woff2" crossorigin>
  <!-- Prevent hydration blink by ensuring content stays visible during Angular bootstrap -->
  <style>
    /* Ensure app-root content is visible during hydration */
    app-root { display: block; }
    /* Prevent layout shift during hydration */
    app-root:empty { min-height: 100vh; }
  </style>
