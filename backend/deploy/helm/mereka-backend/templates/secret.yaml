{{- if not .Values.secrets.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: mereka-backend-secrets
  labels:
    {{- include "mereka-backend.labels" . | nindent 4 }}
type: Opaque
stringData:
  MONGODB_URI: {{ .Values.mongodb.uri | quote }}
  JWT_SECRET: {{ .Values.secrets.jwtSecret | quote }}
  JWT_REFRESH_SECRET: {{ .Values.secrets.jwtRefreshSecret | quote }}
  # Stripe Multi-Region Configuration
  STRIPE_ATLAS_SECRET_KEY: {{ .Values.secrets.stripeAtlasSecretKey | quote }}
  STRIPE_ATLAS_WEBHOOK_SECRET: {{ .Values.secrets.stripeAtlasWebhookSecret | quote }}
  STRIPE_ATLAS_PUBLISHABLE_KEY: {{ .Values.secrets.stripeAtlasPublishableKey | quote }}
  STRIPE_MY_SECRET_KEY: {{ .Values.secrets.stripeMySecretKey | quote }}
  STRIPE_MY_WEBHOOK_SECRET: {{ .Values.secrets.stripeMyWebhookSecret | quote }}
  STRIPE_MY_PUBLISHABLE_KEY: {{ .Values.secrets.stripeMyPublishableKey | quote }}
  FIREBASE_PROJECT_ID: {{ .Values.secrets.firebaseProjectId | quote }}
  FIREBASE_CLIENT_EMAIL: {{ .Values.secrets.firebaseClientEmail | quote }}
  FIREBASE_PRIVATE_KEY: {{ .Values.secrets.firebasePrivateKey | quote }}
{{- end }}
